{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- Dynamic Title -->
    <title>{% block title %}StudioSync{% endblock %}</title>

    <link rel="icon" type="image/png" href="{% static 'images/logo.png' %}">

    <!-- Meta -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="StudioSync - AI Powered Photo Studio Booking Platform">
    <meta name="theme-color" content="#4f46e5">
    <script>
        (function () {
            const savedTheme = localStorage.getItem('studiosync_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.documentElement.setAttribute('data-bs-theme', savedTheme);
        })();
    </script>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Global CSS -->
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
    <link rel="stylesheet" href="{% static 'css/base/chatbot.css' %}">
    <link rel="icon" type="image/png" href="{% static 'images/logo.png' %}">

    <!-- Page Specific CSS -->
    {% block extra_css %}{% endblock %}
</head>

<body data-role="{{ user.role|default:'' }}">

    

    <!-- ================= MAIN CONTENT ================= -->
    {% block content %}
    {% endblock %}

    <button type="button" class="theme-toggle-btn theme-floating-toggle" data-theme-toggle>
        <i class="bi bi-sun-fill" data-theme-icon></i>
        <span data-theme-text>Light Mode</span>
    </button>

  

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Global JS -->
    <script src="{% static 'js/global.js' %}"></script>

    <!-- Chatbot JS (Load Only Once) -->
    <script src="{% static 'js/core/chatbot.js' %}"></script>

    <!-- Page Specific JS -->
    {% block extra_js %}{% endblock %}

</body>

</html>
