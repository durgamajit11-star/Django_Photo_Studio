{% extends "base.html" %}

{% block title %}Password Updated{% endblock %}

{% block content %}
<div class="container py-5" style="max-width: 520px;">
    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4 p-md-5 text-center">
            <h1 class="h4 mb-2">Password Updated</h1>
            <p class="text-muted mb-4">Your password was changed successfully. You can now sign in.</p>
            <a href="{% url 'auth_page' %}" class="btn btn-primary">Go to Login</a>
        </div>
    </div>
</div>
{% endblock %}
