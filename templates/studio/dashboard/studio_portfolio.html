{% extends "studio/dashboard/studio_base.html" %}
{% block title %}Portfolio{% endblock %}

{% block studio_content %}

<div class="container-fluid">
    <h3 class="fw-bold mb-4">📸 My Portfolio</h3>

    <!-- Upload Section -->
    <div class="card bg-dark border-0 shadow-sm p-4 mb-4">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-4">
                    <input type="file" name="image" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <input type="text" name="caption" class="form-control" placeholder="Image Caption">
                </div>
                <div class="col-md-4">
                    <button class="btn btn-primary w-100">Upload</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Gallery -->
    <div class="row g-4">
        {% for photo in photos %}
        <div class="col-md-3">
            <div class="card bg-dark text-light border-0 shadow-sm">
                <img src="{{ photo.image.url }}" class="card-img-top">
                <div class="card-body text-center">
                    <p class="small">{{ photo.caption }}</p>
                    <a href="{% url 'delete_photo' photo.id %}" class="btn btn-sm btn-danger">Delete</a>
                </div>
            </div>
        </div>
        {% empty %}
        <p class="text-muted">No images uploaded yet.</p>
        {% endfor %}
    </div>
</div>

{% endblock %}
